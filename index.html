<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA CRED - REGISTRO</title>
    <style>
        :root { --primary: #1e40af; --secondary: #0ea5e9; --accent: #10b981; --bg: #f1f5f9; --text: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 650px; padding: 40px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); position: relative; }
        h2 { text-align: center; color: var(--primary); margin-top: 0; font-size: 28px; }
        .status-msg { text-align: center; font-size: 13px; font-weight: bold; padding: 8px; border-radius: 5px; margin-bottom: 20px; display: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #475569; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        input:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1); }
        button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s ease; }
        button:hover { background: #1e3a8a; }

        /* Estilos del Mensaje Modal (Cero avisos del navegador) */
        #customModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; text-align: center; max-width: 300px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .modal-content h3 { color: var(--primary); margin-top: 0; }
        .modal-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px; width: 100%; }

        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle">¡ÉXITO!</h3>
        <p id="modalMsg">La cita se registró correctamente.</p>
        <button class="modal-btn" onclick="closeModal()">ACEPTAR</button>
    </div>
</div>

<div class="container">
    <h2>Registro de Citas CRED</h2>
    <div id="statusBox" class="status-msg"></div>

    <form id="citaForm">
        <div class="form-group">
            <label>DNI (8 dígitos):</label>
            <input type="number" name="DNI" id="dniInput" placeholder="Ej: 12345678" required oninput="limitDNI(this)">
        </div>

        <div class="form-group">
            <label>NOMBRE COMPLETO:</label>
            <input type="text" name="NOMBRE" id="nombreInput" required>
        </div>

        <div class="grid">
            <div class="form-group">
                <label>FECHA NACIMIENTO:</label>
                <input type="date" name="FECHA_NACIMIENTO" id="nacInput" required>
            </div>
            <div class="form-group">
                <label>CELULAR:</label>
                <input type="tel" name="CELULAR" id="telInput" required>
            </div>
        </div>

        <div class="grid">
            <div class="form-group">
                <label>FECHA CITA PROGRAMADA:</label>
                <input type="date" name="FECHA_CITA" id="citaInput" required>
            </div>
            <div class="form-group">
                <label>TURNO:</label>
                <select name="TURNO" id="turnoInput">
                    <option value="MAÑANA">MAÑANA</option>
                    <option value="TARDE">TARDE</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>CONSULTORIO:</label>
            <select name="CONSULTORIO" id="consInput">
                <option value="CRED- (CONSULTORIO N° 1)">CRED - CONSULTORIO N° 1</option>
                <option value="CRED- (CONSULTORIO N° 2)">CRED - CONSULTORIO N° 2</option>
                <option value="CRED- (CONSULTORIO N° 3)">CRED - CONSULTORIO N° 3</option>
            </select>
        </div>

        <div class="form-group">
            <label>ESTABLECIMIENTO DE SALUD (EESS):</label>
            <input list="listaEESS" name="EESS" id="eessInput" placeholder="Escriba para buscar..." required>
            <datalist id="listaEESS">
                <option value="C.S. SURCO">
                <option value="C.S. MIRAFLORES">
                <option value="C.S. AMARILIS">
                <option value="C.S. PERÚ COREA">
                <option value="C.S. LLICUA">
                <option value="C.S. SANTA MARÍA DEL VALLE">
                <option value="C.S. LAS MORAS">
                <option value="C.S. APARICIO POMARES">
                <option value="C.S. ACOMAYO">
                <option value="P.S. LA ESPERANZA">
            </datalist>
        </div>

        <button type="submit" id="btnEnviar">REGISTRAR CITA</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzAOx3g7_MmXC5SyS7rjeP-osc-dXLXDgywU1V189ewgRz2ySSYA-g-dZ5gEvNHeNSn/exec';
    const form = document.getElementById('citaForm');
    const statusBox = document.getElementById('statusBox');

    // 1. Restricción estricta de 8 dígitos en PC y Móvil
    function limitDNI(element) {
        if (element.value.length > 8) {
            element.value = element.value.slice(0, 8);
        }
    }

    // 2. Manejo de Modal Personalizado
    function showModal(title, msg) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = msg;
        document.getElementById('customModal').style.display = 'flex';
    }
    function closeModal() {
        document.getElementById('customModal').style.display = 'none';
    }

    // 3. Conversión de fecha robusta para corregir el error de carga
    function convertirAFechaInput(fechaRaw) {
        if (!fechaRaw) return "";
        let fecha = new Date(fechaRaw);
        // Si la fecha es inválida por formato string DD/MM/YYYY
        if (isNaN(fecha.getTime())) {
            const p = fechaRaw.toString().split('/');
            if(p.length === 3) return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
            return "";
        }
        return fecha.toISOString().split('T')[0];
    }

    // Búsqueda de DNI
    document.getElementById('dniInput').addEventListener('input', async (e) => {
        const dni = e.target.value;
        if (dni.length === 8) {
            statusBox.style.display = 'block';
            statusBox.style.background = '#e0f2fe';
            statusBox.innerText = "🔍 Buscando historial...";
            try {
                const response = await fetch(`${scriptURL}?dni=${dni}`);
                const data = await response.json();
                if (data.encontrado) {
                    document.getElementById('nombreInput').value = data.nombre || "";
                    document.getElementById('telInput').value = data.celular || "";
                    document.getElementById('eessInput').value = data.eess || "";
                    document.getElementById('nacInput').value = convertirAFechaInput(data.nacimiento);
                    document.getElementById('citaInput').value = convertirAFechaInput(data.fechaCita);
                    if(data.turno) document.getElementById('turnoInput').value = data.turno;
                    if(data.consultorio) document.getElementById('consInput').value = data.consultorio;
                    
                    statusBox.style.background = '#dcfce7';
                    statusBox.innerText = "✅ Datos cargados correctamente.";
                } else {
                    statusBox.style.background = '#fef3c7';
                    statusBox.innerText = "👤 Paciente nuevo.";
                }
            } catch (e) { 
                statusBox.innerText = "⚠️ Error al conectar con base de datos."; 
            }
        } else {
            statusBox.style.display = 'none';
        }
    });

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // Validación de EESS
        const eessVal = document.getElementById('eessInput').value;
        const opciones = Array.from(document.querySelectorAll('#listaEESS option')).map(o => o.value);
        if (!opciones.includes(eessVal)) {
            showModal("ERROR", "Debe seleccionar un establecimiento de la lista.");
            return;
        }

        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.innerText = "REGISTRANDO...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
        .then(() => {
            showModal("¡ÉXITO!", "La cita se ha registrado correctamente.");
            form.reset();
            statusBox.style.display = 'none';
            btn.disabled = false;
            btn.innerText = "REGISTRAR CITA";
        })
        .catch(() => {
            showModal("ERROR", "No se pudo conectar con el servidor.");
            btn.disabled = false;
            btn.innerText = "REGISTRAR CITA";
        });
    });
</script>
</body>
</html>
