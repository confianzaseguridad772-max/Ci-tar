<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRAR CITAS CRED</title>
    <style>
        :root {
            --primary: #1e40af;
            --secondary: #0ea5e9;
            --accent: #10b981;
            --bg: #f1f5f9;
            --text: #1e293b;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .container { 
            background: white; 
            width: 100%; max-width: 650px; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
        }

        h2 { 
            text-align: center; color: var(--primary); 
            margin-top: 0; font-size: 28px;
            letter-spacing: -0.5px;
        }

        .status-msg {
            text-align: center; font-size: 13px; font-weight: bold;
            padding: 8px; border-radius: 5px; margin-bottom: 20px; display: none;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .form-group { margin-bottom: 18px; }

        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #475569; }

        input, select { 
            width: 100%; padding: 12px; border: 2px solid #e2e8f0; 
            border-radius: 10px; box-sizing: border-box; font-size: 15px;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none; border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        }

        button { 
            width: 100%; padding: 16px; background: var(--primary); 
            color: white; border: none; border-radius: 10px; 
            font-size: 16px; font-weight: 700; cursor: pointer; 
            transition: background 0.3s ease; margin-top: 10px;
        }

        button:hover { background: #1e3a8a; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }

        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro de Citas CRED</h2>
    
    <div id="statusBox" class="status-msg"></div>

    <form id="citaForm">
        <div class="form-group">
            <label>DNI (Búsqueda automática):</label>
            <input type="number" name="DNI" id="dniInput" placeholder="Ingrese 8 dígitos" required>
        </div>

        <div class="form-group">
            <label>NOMBRE COMPLETO DEL PACIENTE:</label>
            <input type="text" name="NOMBRE" id="nombreInput" required>
        </div>

        <div class="grid">
            <div class="form-group">
                <label>FECHA DE NACIMIENTO:</label>
                <input type="date" name="FECHA_NACIMIENTO" id="nacInput" required>
            </div>
            <div class="form-group">
                <label>CELULAR DE CONTACTO:</label>
                <input type="tel" name="CELULAR" id="telInput" required>
            </div>
        </div>

        <div class="grid">
            <div class="form-group">
                <label>FECHA DE CITA PROGRAMADA:</label>
                <input type="date" name="FECHA_CITA" required>
            </div>
            <div class="form-group">
                <label>TURNO:</label>
                <select name="TURNO">
                    <option value="MAÑANA">MAÑANA</option>
                    <option value="TARDE">TARDE</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>CONSULTORIO ASIGNADO:</label>
            <select name="CONSULTORIO">
                <option value="CRED- (CONSULTORIO N° 1)">CRED - CONSULTORIO N° 1</option>
                <option value="CRED- (CONSULTORIO N° 2)">CRED - CONSULTORIO N° 2</option>
                <option value="CRED- (CONSULTORIO N° 3)">CRED - CONSULTORIO N° 3</option>
            </select>
        </div>

        <div class="form-group">
            <label>ESTABLECIMIENTO DE SALUD (Buscar):</label>
            <input list="listaEESS" name="EESS" id="eessInput" placeholder="Escriba para filtrar establecimientos..." required>
            <datalist id="listaEESS">
                <option value="HOSPITAL REGIONAL HERMILIO VALDIZÁN">
                <option value="HOSPITAL CARLOS SHOWING FERRARI">
                <option value="C.S. AMARILIS">
                <option value="C.S. PERÚ COREA">
                <option value="C.S. LLICUA">
                <option value="C.S. SANTA MARÍA DEL VALLE">
                <option value="C.S. LAS MORAS">
                <option value="C.S. APARICIO POMARES">
                <option value="C.S. ACOMAYO">
                <option value="P.S. LA ESPERANZA">
                <option value="HOSPITAL NACIONAL ARZOBISPO LOAYZA">
                <option value="HOSPITAL NACIONAL DOS DE MAYO">
                <option value="HOSPITAL NACIONAL NIÑO SAN BORJA">
                <option value="HOSPITAL EDGARDO REBAGLIATI">
                <option value="C.S. SURCO">
                <option value="C.S. MIRAFLORES">
                <option value="HOSPITAL REGIONAL DE TRUJILLO">
                <option value="HOSPITAL GOYENECHE AREQUIPA">
                     </datalist>
        </div>

        <button type="submit" id="btnEnviar">REGISTRAR CITA</button>
    </form>
</div>

<script>
    // ENLACE DE GOOGLE APPS SCRIPT
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzX3EPgWlyeF4GBXLVobkWgdND4RfSqsHVutLcQVvx3gAoBD3YoKRPycFV0mElyrDv8/exec';
    const form = document.getElementById('citaForm');
    const statusBox = document.getElementById('statusBox');

    // Búsqueda de DNI automática
    document.getElementById('dniInput').addEventListener('input', async (e) => {
        const dni = e.target.value;
        if (dni.length === 8) {
            statusBox.style.display = 'block';
            statusBox.style.background = '#e0f2fe';
            statusBox.style.color = '#0369a1';
            statusBox.innerText = "🔍 Buscando historial del paciente...";

            try {
                const response = await fetch(`${scriptURL}?dni=${dni}`);
                const data = await response.json();

                if (data.encontrado) {
                    document.getElementById('nombreInput').value = data.nombre;
                    document.getElementById('telInput').value = data.celular;
                    document.getElementById('eessInput').value = data.eess;
                    
                    // Convertir fecha DD/MM/YYYY a YYYY-MM-DD para el input date
                    if (data.nacimiento && data.nacimiento.includes('/')) {
                        const parts = data.nacimiento.split('/');
                        document.getElementById('nacInput').value = `${parts[2]}-${parts[1]}-${parts[0]}`;
                    }

                    statusBox.style.background = '#dcfce7';
                    statusBox.style.color = '#15803d';
                    statusBox.innerText = "✅ Paciente encontrado. Datos cargados correctamente.";
                } else {
                    statusBox.style.background = '#fef3c7';
                    statusBox.style.color = '#92400e';
                    statusBox.innerText = "👤 Paciente nuevo. Por favor complete los datos.";
                }
            } catch (error) {
                console.error('Error!', error);
                statusBox.innerText = "⚠️ Error al conectar con la base de datos.";
            }
        } else {
            statusBox.style.display = 'none';
        }
    });

    // Envío de formulario
    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.innerText = "REGISTRANDO";

        // Recolectar datos y asegurar MAYÚSCULAS
        const formData = new FormData(form);
        
        fetch(scriptURL, { method: 'POST', body: formData})
        .then(response => {
            alert("¡CITA REGISTRADA!");
            form.reset();
            statusBox.style.display = 'none';
            btn.disabled = false;
            btn.innerText = "REGISTRAR CITA";
        })
        .catch(error => {
            alert("Error al enviar los datos. Intente nuevamente.");
            btn.disabled = false;
            btn.innerText = "REGISTRAR CITA";
        });
    });
</script>

</body>
</html>
