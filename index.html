<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Citas CRED</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; }
        button { margin-top: 20px; width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Formulario de Citas</h2>
    <form id="citaForm">
        <label>DNI:</label>
        <input type="text" name="DNI" required>

        <label>Nombre Completo:</label>
        <input type="text" name="NOMBRE" required>

        <label>Fecha de Nacimiento:</label>
        <input type="date" name="FECHA_NACIMIENTO" required>

        <label>Celular:</label>
        <input type="tel" name="CELULAR" required>

        <label>Fecha de Cita:</label>
        <input type="date" name="FECHA_CITA" required>

        <label>Turno:</label>
        <select name="TURNO">
            <option value="Mañana">Mañana</option>
            <option value="Tarde">Tarde</option>
        </select>

        <label>Consultorio:</label>
        <select name="CONSULTORIO">
            <option value="CRED- (CONSULTORIO N° 1)">CRED- (CONSULTORIO N° 1)</option>
            <option value="CRED- (CONSULTORIO N° 2)">CRED- (CONSULTORIO N° 2)</option>
            <option value="CRED- (CONSULTORIO N° 3)">CRED- (CONSULTORIO N° 3)</option>
        </select>

        <label>EESS (Establecimiento de Salud):</label>
        <input type="text" name="EESS" required>

        <button type="submit" id="btnEnviar">Enviar Datos</button>
    </form>

    <script>
        const form = document.getElementById('citaForm');
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw7MZIEoZTxehZ3_iXdQXEOmLx-rqXc2aJGfGjJr_oe20rmuKlrqRe6zpu-hPQRcRKK/exec'; // <--- PEGA AQUÍ TU URL

        form.addEventListener('submit', e => {
            e.preventDefault();
            document.getElementById('btnEnviar').disabled = true;
            document.getElementById('btnEnviar').innerText = "Enviando...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    alert("¡Datos enviados con éxito!");
                    form.reset();
                    document.getElementById('btnEnviar').disabled = false;
                    document.getElementById('btnEnviar').innerText = "Enviar Datos";
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert("Hubo un error al enviar.");
                });
        });
    </script>
</body>
</html>
